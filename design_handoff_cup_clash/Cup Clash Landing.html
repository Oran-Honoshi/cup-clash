*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Outfit',sans-serif;
  -webkit-font-smoothing:antialiased;
  color:white;
  background:#050810;
  position:relative;
  min-height:100vh;
  overflow-x:hidden;
}
:root{
  --ac:#00FF88;
  --cyan:#00D4FF;
  --purple:#8B5CF6;
  --amber:#fbbf24;
  --display:'Bricolage Grotesque',sans-serif;
}

/* Stadium background, fixed */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background-image:url('stadium-bg.png');
  background-size:cover;background-position:center;
  filter:saturate(110%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(8,5,30,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(5,8,16,0.85) 0%, transparent 50%),
    linear-gradient(180deg, rgba(5,8,16,0.5) 0%, rgba(5,8,16,0.78) 100%);
}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.25);}

@keyframes floatY{0%,100%{transform:translateY(0) rotate(var(--rot,0deg));}50%{transform:translateY(-14px) rotate(var(--rot,0deg));}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}

/* ── RESPONSIVE BREAKPOINTS ───────────────────────────────────────── */
.nav-desktop{display:flex;}
.nav-mobile-toggle{display:none;}

@media (max-width: 1024px){
  .nav-desktop{display:none !important;}
  .nav-mobile-toggle{display:inline-flex !important;}
  .grid-2{grid-template-columns:1fr !important;gap:48px !important;}
  .grid-3{grid-template-columns:repeat(2, 1fr) !important;}
  .grid-4{grid-template-columns:repeat(2, 1fr) !important;}
  .hero-phones{height:520px !important;}
  .showcase-phones{height:420px !important;}
  .showcase-phones > div.phone-wrap-far{display:none !important;}
  .showcase-phones > div.phone-wrap-mid{transform:scale(0.7) !important;}
  .showcase-phones > div.phone-wrap-center{transform:scale(0.85) translateX(-50%) !important;}
  .articles-hero{grid-template-columns:1fr !important;}
}

@media (max-width: 720px){
  body{font-size:15px;}
  .grid-3{grid-template-columns:1fr !important;}
  .grid-4{grid-template-columns:repeat(2, 1fr) !important;gap:20px !important;}
  .section-pad{padding-top:64px !important;padding-bottom:64px !important;}
  .hero-pad{padding:48px 5% 60px !important;}
  .hero-phones{height:420px !important;}
  .hero-phones .phone{transform:scale(0.85) rotate(var(--rot,0deg)) !important;}
  .showcase-phones{height:380px !important;}
  .showcase-phones > div.phone-wrap-mid{display:none !important;}
  .showcase-phones > div.phone-wrap-far{display:none !important;}
  .showcase-phones > div.phone-wrap-center{transform:scale(0.75) translateX(-50%) !important;}
  .pricing-tier-h{font-size:20px !important;}
  .footer-grid{grid-template-columns:1fr 1fr !important;gap:30px !important;}
  .nav-sign-in{display:none !important;}
  .cta-section{padding:40px 24px !important;}
  .article-meta-date{display:none;}
}

@media (max-width: 480px){
  .grid-4{grid-template-columns:1fr 1fr !important;}
  .hero-phones{height:380px !important;}
  .hero-phones .phone{transform:scale(0.72) rotate(var(--rot,0deg)) !important;}
  .btn-primary, .btn-secondary{padding:14px 22px !important;font-size:14px !important;}
  .nav-cta-text{display:none;}
  .hero-cta-row{flex-direction:column !important;}
  .hero-cta-row > a{width:100% !important;justify-content:center !important;}
  .footer-grid{grid-template-columns:1fr !important;}
  .footer-bottom{flex-direction:column !important;align-items:flex-start !important;}
}

/* Phone mockup styles */
.phone{
  position:relative;width:280px;
  background:rgba(8,5,18,0.85);
  backdrop-filter:blur(20px);
  border-radius:34px;
  border:1.5px solid rgba(255,255,255,0.12);
  box-shadow:

    inset 0 1px 0 rgba(255,255,255,0.15);
  overflow:hidden;
  flex-shrink:0;
}
.phone-notch{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:80px;height:22px;background:#050810;border-radius:0 0 14px 14px;z-index:50;
}
.phone-screen{
  padding:30px 14px 12px;
  display:flex;flex-direction:column;
  height:520px;
  position:relative;
  overflow:hidden;
}

.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;

}
.h-display{
  font-family:var(--display);font-weight:800;
  color:white;letter-spacing:-0.005em;line-height:1.05;

}

.btn-primary{
  background:linear-gradient(135deg,var(--ac),var(--cyan));

.chip{

function Navbar(){
  const [open,setOpen]=useState(false);
  const links=['How it works','Features','Articles','Pricing','For Companies','FAQ'];
  const slug=l=>l.toLowerCase().replace(/\s/g,'-');

  // Close menu on resize-up & on Escape
  useEffect(()=>{
    const onResize=()=>{if(window.innerWidth>1024)setOpen(false);};
    const onKey=e=>{if(e.key==='Escape')setOpen(false);};
    window.addEventListener('resize',onResize);
    window.addEventListener('keydown',onKey);
    return()=>{window.removeEventListener('resize',onResize);window.removeEventListener('keydown',onKey);};
  },[]);

  // Lock body scroll when open
  useEffect(()=>{
    document.body.style.overflow=open?'hidden':'';
    return()=>{document.body.style.overflow='';};
  },[open]);

    <>

          <span style={{fontFamily:'var(--display)',fontWeight:800,fontSize:18,color:'white',whiteSpace:'nowrap'}}>Cup Clash</span>

        {/* Desktop links — hidden < 1024px */}
        <div className="nav-desktop" style={{gap:'clamp(14px, 2.4vw, 28px)',alignItems:'center',flex:1,justifyContent:'center'}}>
          {links.map(l=>(
            <a key={l} href={`#${slug(l)}`}
              style={{fontSize:13,color:'rgba(255,255,255,0.65)',fontWeight:500,textDecoration:'none',transition:'color 0.18s',whiteSpace:'nowrap'}}

          {/* Hamburger — shown <= 1024px */}
          <button
