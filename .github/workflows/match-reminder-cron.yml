name: Match reminder cron

# Vercel Hobby plan caps cron jobs at 2/day, but a 24h/1h-before-kickoff
# reminder only means anything if checked on a tight interval — so, like
# scores-cron.yml and telegram-reminders-cron.yml, this workflow pings the
# endpoint externally instead of relying on vercel.json.
# Requires repo secrets SCORES_APP_URL and CRON_SECRET (shared with the
# other cron workflows).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  ping-match-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/reminders/match
        run: |
          curl -sf -X POST "${SCORES_APP_URL}/api/reminders/match" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o - -w "\nHTTP %{http_code}\n"
        env:
          SCORES_APP_URL: ${{ secrets.SCORES_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
