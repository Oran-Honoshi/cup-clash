name: Live scores cron

# Vercel Hobby plan caps cron jobs at 2/day, but live scores need to poll every
# 5 min during match windows — so this workflow pings the endpoint instead.
# Requires repo secret SCORES_APP_URL (e.g. https://cup-clash.vercel.app) and
# CRON_SECRET (must match the CRON_SECRET env var set in the Vercel project).
#
# app/api/scores/route.ts throttles the expensive per-fixture API-Football
# calls (events, statistics) internally so this 5-min cadence doesn't multiply
# request volume 4x on its own — see the minute-advanced checks in STEP 1/1c.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping-scores:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/scores
        run: |
          curl -sf -X POST "${SCORES_APP_URL}/api/scores" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o - -w "\nHTTP %{http_code}\n"
        env:
          SCORES_APP_URL: ${{ secrets.SCORES_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
