<!-- ============================================================= -->
<!-- CUP CLASH · paste inside <head>. Swap https://cupclash.live    -->
<!-- for your real domain (OG/Twitter images MUST be absolute).    -->
<!-- ============================================================= -->

<!-- Browser tab favicons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

<!-- iOS home screen -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Cup Clash">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- PWA manifest + theme -->
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0a1b0e">

<!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, WhatsApp) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Cup Clash">
<meta property="og:title" content="Cup Clash — Football Tournaments">
<meta property="og:description" content="Predict. Compete. Clash.">
<meta property="og:url" content="https://cupclash.live/">
<meta property="og:image" content="https://cupclash.live/icons/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Cup Clash golden trophy on a football pitch">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Cup Clash — Football Tournaments">
<meta name="twitter:description" content="Predict. Compete. Clash.">
<meta name="twitter:image" content="https://cupclash.live/icons/og-image.png">
